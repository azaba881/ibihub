{% extends 'base.html' %}
{% load static %}
{% block title %}Mot de passe modifié — IbiHub{% endblock %}
{% block content %}
<div class="clearfix"></div>
<div class="ibihub-contact-hero">
	<div class="container ibihub-contact-hero__top">
		<nav class="ibihub-breadcrumb" aria-label="Fil d'Ariane">
			<ol>
				<li><a href="{% url 'core:home' %}">Accueil</a></li>
				<li aria-current="page">Connexion</li>
			</ol>
		</nav>
	</div>
	<h1>Mot de passe mis à jour</h1>
	<svg class="ibihub-contact-wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none" aria-hidden="true">
		<path d="M0,40 C360,90 720,0 1080,40 C1260,60 1380,50 1440,45 L1440,80 L0,80 Z"></path>
	</svg>
</div>
<div class="ibihub-auth-page">
	<div class="ibihub-auth-card">
		<p style="font-size:15px;line-height:1.55;">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
		<p style="margin-top:20px;"><a href="{% url 'core:sign_in' %}" class="ibihub-auth-primary-btn" style="display:inline-block;text-decoration:none;text-align:center;">Se connecter</a></p>
	</div>
</div>
{% endblock %}
