<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message contact IbiHub</title>
</head>
<body style="margin:0;padding:0;background:#eef4f1;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#eef4f1;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(15,123,108,0.12);">
          <tr>
            <td style="background:linear-gradient(135deg,#0F7B6C 0%,#0a5c52 100%);padding:28px 32px;">
              <p style="margin:0;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.85);">IbiHub</p>
              <h1 style="margin:8px 0 0;font-size:22px;font-weight:600;color:#ffffff;line-height:1.3;">Nouveau message — Contact</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 8px;">
              <table role="presentation" width="100%" style="border-collapse:collapse;">
                <tr>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:14px;color:#5a6f68;width:100px;">Nom</td>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:15px;color:#1a2e28;font-weight:600;">{{ name }}</td>
                </tr>
                <tr>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:14px;color:#5a6f68;">E-mail</td>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:15px;"><a href="mailto:{{ email }}" style="color:#0F7B6C;text-decoration:none;">{{ email }}</a></td>
                </tr>
                <tr>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:14px;color:#5a6f68;">Sujet</td>
                  <td style="padding:10px 0;border-bottom:1px solid #e8f0ed;font-size:15px;color:#1a2e28;">{{ subject }}</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 32px;">
              <p style="margin:0 0 10px;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#5a6f68;">Message</p>
              <div style="background:#f6faf8;border-radius:12px;padding:18px 20px;border:1px solid #dcebe6;font-size:15px;line-height:1.6;color:#2d3f38;white-space:pre-wrap;">{{ message }}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;">
              <a href="mailto:{{ email }}" style="display:inline-block;background:#0F7B6C;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 24px;border-radius:999px;">Répondre au visiteur</a>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;background:#f6faf8;font-size:12px;color:#7a8a84;text-align:center;border-top:1px solid #e8f0ed;">
              E-mail envoyé depuis le formulaire de contact du site IbiHub.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
